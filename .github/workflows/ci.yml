name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v3
        with:
          bun-version: "1.3.12"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run check:no-excuse
      - run: bun test
      - run: bun run build

  pnpm-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - uses: pnpm/action-setup@v5
        with:
          version: "11.1.2"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm check:no-excuse
      - run: pnpm test
      - run: pnpm node:build

  cloudflare-workers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v3
        with:
          bun-version: "1.3.12"
      - run: bun install --frozen-lockfile
      - run: bunx wrangler deploy --dry-run --outdir dist-worker
