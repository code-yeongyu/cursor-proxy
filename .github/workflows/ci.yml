name: ci

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  runtime:
    name: ${{ matrix.runtime }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: ["bun", "pnpm-node"]
    steps:
      - uses: actions/checkout@v5
      - if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - if: matrix.runtime == 'pnpm-node'
        uses: pnpm/action-setup@v5
        with:
          version: "11.1.2"
      - if: matrix.runtime == 'pnpm-node'
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "pnpm"
      - if: matrix.runtime == 'pnpm-node'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - if: matrix.runtime == 'bun'
        run: bun install --frozen-lockfile
      - if: matrix.runtime == 'bun'
        run: bun run typecheck
      - if: matrix.runtime == 'bun'
        run: bun run lint
      - if: matrix.runtime == 'bun'
        run: bun run check:no-excuse
      - if: matrix.runtime == 'bun'
        run: bun test
      - if: matrix.runtime == 'bun'
        run: bun run build
      - if: matrix.runtime == 'pnpm-node'
        run: pnpm install --frozen-lockfile
      - if: matrix.runtime == 'pnpm-node'
        run: pnpm typecheck
      - if: matrix.runtime == 'pnpm-node'
        run: pnpm lint
      - if: matrix.runtime == 'pnpm-node'
        run: pnpm check:no-excuse
      - if: matrix.runtime == 'pnpm-node'
        run: pnpm test
      - if: matrix.runtime == 'pnpm-node'
        run: pnpm node:build

  cloudflare-workers:
    name: cloudflare-workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - run: bun install --frozen-lockfile
      - run: bunx wrangler deploy --dry-run --outdir dist-worker
